name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check for release commit
        id: version
        run: |
          for commit in $(echo '${{ toJson(github.event.commits) }}' | jq -r '.[].message'); do
            if echo "$commit" | grep -q '^chore: release v'; then
              VERSION=$(echo "$commit" | sed 's/^chore: release v//')
              echo "new=$VERSION" >> $GITHUB_OUTPUT
              echo "found=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          done
          echo "found=false" >> $GITHUB_OUTPUT

      - name: Create tag
        if: steps.version.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/git/refs \
            --field ref="refs/tags/v${{ steps.version.outputs.new }}" \
            --field sha="${{ github.sha }}"

      - name: Create GitHub Release
        if: steps.version.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.new }}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --notes ""
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --generate-notes \
              --latest
          fi
